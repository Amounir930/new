version: '3.8'

# ═══════════════════════════════════════════════════════════════
# APEX v2 - Hyper-Scale Production Topology
# ═══════════════════════════════════════════════════════════════
# This stack is strictly for PRODUCTION.
# Built for maximum throughput, edge-caching, and zero-trust.
# Requires: 8 Cores / 16GB RAM minimum.
# ═══════════════════════════════════════════════════════════════

x-log-options: &json_logs
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  # ═══════════════════════════════════════════════════════════════
  # Edge Gateway & SSL Term (Traefik) - The Front Door
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v3.3
    container_name: apex-edge
    restart: always
    command:
      # S8: Hardened Config
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"

      # S7: Encryption / Let's Encrypt (Cloudflare DNS Challenge)
      - "--certificatesresolvers.letsencrypt.acme.email=${ADMIN_EMAIL:-admin@60sec.shop}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"

      # Logs
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOCKER_API_VERSION=1.41
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./htpasswd:/etc/traefik/htpasswd:ro
      - letsencrypt_data:/letsencrypt
      - ./logs/traefik:/var/log/traefik
      - ./traefik-dynamic.yml:/etc/traefik/dynamic:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-middlewares.rule=Host(`localhost`)"
      - "traefik.http.routers.traefik-middlewares.entrypoints=web"
      - "traefik.http.routers.traefik-middlewares.service=api@internal"
      - "traefik.http.routers.traefikdash.rule=Host(`traefik.60sec.shop`)"
      - "traefik.http.routers.traefikdash.priority=6000"
      - "traefik.http.routers.traefikdash.service=api@internal"
      - "traefik.http.routers.traefikdash.entrypoints=websecure"
      - "traefik.http.routers.traefikdash.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefikdash.middlewares=apex-cf-allowlist@file,apex-dash-redirect@file,apex-basic-auth@file"
    deploy:
      resources:
        limits:
          pids: 150
    logging: *json_logs
    networks:
      - apex-public
      - apex-internal
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # S3 Object Storage (MinIO)
  # ═══════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: apex-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DOMAIN: storage.60sec.shop
    volumes:
      - minio_data:/data
    labels:
      - "traefik.enable=true"
      # API Endpoint
      - "traefik.http.routers.minio-api.rule=Host(`storage.60sec.shop`)"
      - "traefik.http.routers.minio-api.entrypoints=websecure"
      - "traefik.http.routers.minio-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-api.service=minio-api"
      - "traefik.http.services.minio-api.loadbalancer.server.port=9000"
      # Console UI Endpoint (S1: Isolated via htpasswd on Traefik dynamically)
      - "traefik.http.routers.minio-console.rule=Host(`storage-admin.60sec.shop`)"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.service=minio-console"
      - "traefik.http.services.minio-console.loadbalancer.server.port=9001"
    networks:
      - apex-internal
      - apex-public
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # Source Of Truth (PostgreSQL 16)
  # ═══════════════════════════════════════════════════════════════
  apex-postgres:
    image: postgres:15-alpine
    container_name: apex-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-apex_v2}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          pids: 300
    logging: *json_logs
    networks:
      - apex-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # Cache & Event Bus (Redis)
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          pids: 100
    logging: *json_logs
    networks:
      - apex-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # Brain (NestJS API) - Horizon Ready
  # Tier: apex-public + apex-internal + apex-data
  # ═══════════════════════════════════════════════════════════════
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: apex-api
    restart: always
    env_file: .env
    depends_on:
      apex-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m # Larger tmp for exports
    volumes:
      - ./db-certs/server.crt:/etc/ssl/certs/db-ca.crt:ro
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_SSL: "false"
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/db-ca.crt
      DB_CA_CERT_PATH: /etc/ssl/certs/db-ca.crt
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: apex-api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.60sec.shop`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=apex-cors@file"
      - "traefik.http.services.api.loadbalancer.server.port=3000"
      # Routing for Super Admin specific endpoints
      - "traefik.http.routers.admin-api.rule=Host(`admin.60sec.shop`) && PathPrefix(`/api/v1/admin`)"
      - "traefik.http.routers.admin-api.entrypoints=websecure"
      - "traefik.http.routers.admin-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin-api.middlewares=apex-cors@file"
      - "traefik.http.services.admin-api.loadbalancer.server.port=3000"
    networks:
      - apex-public
      - apex-internal
      - apex-data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "bun --eval 'fetch(\"http://localhost:3000/api/health\").then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))'"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # Dedicated Background Worker (NestJS)
  # Tier: apex-internal + apex-data
  # ═══════════════════════════════════════════════════════════════
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: apex-worker
    restart: always
    env_file: .env
    depends_on:
      apex-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    volumes:
      - ./db-certs/server.crt:/etc/ssl/certs/db-ca.crt:ro
    environment:
      NODE_ENV: production
      WORKER_MODE: "true"
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/db-ca.crt
      DB_CA_CERT_PATH: /etc/ssl/certs/db-ca.crt
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: apex-worker
    networks:
      - apex-internal
      - apex-data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ═══════════════════════════════════════════════════════════════
  # Command Center (Super Admin UI)
  # Tier: apex-public
  # ═══════════════════════════════════════════════════════════════
  super-admin:
    build:
      context: .
      dockerfile: apps/super-admin/Dockerfile
    container_name: apex-super-admin
    restart: always
    user: "1000:1000"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api
      JWT_SECRET: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: apex-super-admin
    networks:
      - apex-public
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.super-admin.rule=Host(`admin.60sec.shop`) || Host(`super-admin.60sec.shop`)"
      - "traefik.http.routers.super-admin.entrypoints=websecure"
      - "traefik.http.routers.super-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.super-admin.loadbalancer.server.port=3001"

  # ═══════════════════════════════════════════════════════════════
  # Multi-Tenant Storefront (Next.js)
  # Tier: apex-public
  # ═══════════════════════════════════════════════════════════════
  storefront:
    image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/store:latest
    container_name: apex-storefront
    restart: always
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api
      INTERNAL_API_URL: http://api:3000/api
      PORT: 3002
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: apex-store
    networks:
      - apex-public
      - apex-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storefront.rule=HostRegexp(`{subdomain:[a-zA-Z0-9-]+}.60sec.shop`) || Host(`60sec.shop`, `www.60sec.shop`)"
      - "traefik.http.routers.storefront.entrypoints=websecure"
      - "traefik.http.routers.storefront.tls.certresolver=letsencrypt"
      - "traefik.http.services.storefront.loadbalancer.server.port=3002"

  # ═══════════════════════════════════════════════════════════════
  # Backups (Postgres & Gitea)
  # ═══════════════════════════════════════════════════════════════
  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: apex-db-backup
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: apex-postgres
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-apex_v2}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    volumes:
      - db_backups:/backups
    deploy:
      resources:
        limits:
          pids: 50
    logging: *json_logs
    networks:
      - apex-data

  # ═══════════════════════════════════════════════════════════════
  # Connection Pooler (PgBouncer) - Hyper-Scale Ready
  # ═══════════════════════════════════════════════════════════════
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: apex-pgbouncer
    restart: always
    environment:
      DB_USER: ${POSTGRES_USER:-apex}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: apex-postgres
      DB_NAME: ${POSTGRES_DB:-apex_v2}
      MAX_CLIENT_CONN: 5000
      DEFAULT_POOL_SIZE: 150
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: ${PGBOUNCER_ADMIN_USERS:-postgres,apex}
      CLIENT_TLS_SSLMODE: disable
      SERVER_TLS_SSLMODE: prefer
      CLIENT_TLS_CERT_FILE: /etc/pgbouncer/certs/server.crt
      CLIENT_TLS_KEY_FILE: /etc/pgbouncer/certs/server.key
    volumes:
      - ./db-certs:/etc/pgbouncer/certs:ro
    depends_on:
      apex-postgres:
        condition: service_healthy
    networks:
      - apex-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER:-apex} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ═══════════════════════════════════════════════════════════════
  # High-Performance Catalog Search (Meilisearch)
  # ═══════════════════════════════════════════════════════════════
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: apex-meilisearch
    restart: always
    env_file: .env
    environment:
      - "DOCKER_API_VERSION=1.41"
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - apex-internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # Dynamic Image Optimization (Imgproxy)
  # ═══════════════════════════════════════════════════════════════
  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: apex-imgproxy
    restart: always
    env_file: .env
    environment:
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_MAX_SRC_RESOLUTION: 50
      IMGPROXY_MAX_SRC_FILE_SIZE: 20971520 # 20MB
      IMGPROXY_BIND: :8080
    networks:
      - apex-internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # Distributed Tracing (OpenTelemetry Collector)
  # ═══════════════════════════════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: apex-otel-collector
    restart: always
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - apex-internal
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config", "/etc/otelcol-contrib/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

# ══════════════════════════════════════════════════════════════
# جميع الأسرار تُقرأ حصراً من ملف .env (المصدر الوحيد للحقيقة)
# لا توجد docker secrets — .env هو الكتاب المقدس
# ══════════════════════════════════════════════════════════════

volumes:
  postgres_data:
  redis_data:
  minio_data:
  gitea_data:
  gitea_conf:
  letsencrypt_data:
  gitea_db_data:
  gitea_backups:
  db_backups:
  meilisearch_data:

networks:
  apex-public:
    external: true
  apex-internal:
    external: true
  apex-data:
    external: true
