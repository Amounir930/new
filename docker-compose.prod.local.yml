version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════
  # Edge Gateway & SSL Term (Traefik) - The Front Door
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v2.10
    container_name: apex-edge
    restart: always
    command:
      # S8: Hardened Config
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"

      # S7: Encryption / Let's Encrypt (Cloudflare DNS Challenge)
      - "--certificatesresolvers.letsencrypt.acme.email=${ADMIN_EMAIL:-admin@60sec.shop}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"

      # Logs
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - "CF_API_EMAIL=${CLOUDFLARE_EMAIL}"
      - "CF_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}"
      - "CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}"
      - "CLOUDFLARE_ZONE_API_TOKEN=${CLOUDFLARE_ZONE_API_TOKEN}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./htpasswd:/etc/traefik/htpasswd:ro
      - letsencrypt_data:/letsencrypt
      - ./logs/traefik:/var/log/traefik
      - ./traefik-dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-middlewares.rule=Host(`localhost`)"
      - "traefik.http.routers.traefik-middlewares.entrypoints=web"
      - "traefik.http.routers.traefik-middlewares.service=api@internal"
      - "traefik.http.routers.traefikdash.rule=Host(`traefik.60sec.shop`)"
      - "traefik.http.routers.traefikdash.priority=6000"
      - "traefik.http.routers.traefikdash.service=api@internal"
      - "traefik.http.routers.traefikdash.entrypoints=websecure"
      - "traefik.http.routers.traefikdash.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefikdash.middlewares=apex-cf-allowlist@file,apex-dash-redirect@file,apex-basic-auth@file"
    deploy:
      resources:
        limits:
          pids: 150
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - apex-public
      - apex-internal
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  apex-public:
    external: true
  apex-internal:
    external: true
  apex-data:
    external: true
