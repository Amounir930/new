name: "🛡️ S3 Input Validation Gate"

on:
  workflow_call:

permissions:
  contents: read
  checks: write

env:
  DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
  JWT_SECRET: test_secret_key_for_ci_environment_only_32
  MINIO_ENDPOINT: localhost
  MINIO_ACCESS_KEY: test_access_key
  MINIO_SECRET_KEY: test_secret_key

jobs:
  s3-input-validation-test:
    name: "S3 Input Validation Security Test"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.45"

      - name: Install dependencies
        run: bun install

      - name: "S3.1 - Controller Validation Audit"
        run: |
          echo "🔍 Auditing controller validation (Surgical)..."
          bun run tools/security-scripts/verify-input-validation.ts

      - name: "S3.2 - SQL Injection Vector Scan"
        run: |
          echo "🚨 Scanning for SQL injection vectors (Surgical)..."
          
          # Detect dangerous string concatenation in queries (active code only)
          # Excludes safe schema management and audit services
          CONCAT=$(grep -rnE "\.(query|execute).*\+" apps/api/src packages/*/src --include="*.ts" 2>/dev/null | \
            grep -vE "^\s*//" | \
            grep -vE "(node_modules|schema-manager|audit\.service|\.test\.|\.spec\.)" || true)

          if [ -n "$CONCAT" ]; then
            echo "🚨 CRITICAL: String concatenation in SQL queries detected!"
            echo "$CONCAT"
            exit 1
          fi

          echo "✅ S3.2: No obvious SQL injection vectors found"
      - name: "S3.3 - XSS Vector Scan"
        run: |
          echo "🚨 Scanning for XSS attack vectors (DOM-based)..."
          
          # Detect dangerous DOM manipulation patterns in active code
          XSS_VECTORS=$(grep -rnE \
            "(innerHTML|outerHTML|dangerouslySetInnerHTML|document\.write|document\.writeln|insertAdjacentHTML|eval\()" \
            apps/*/src packages/*/src --include="*.ts" --include="*.tsx" 2>/dev/null | \
            grep -vE "^\s*//" | \
            grep -vE "(\.test\.|\.spec\.|\.d\.ts|node_modules|__mocks__)" || true)
          
          if [ -n "$XSS_VECTORS" ]; then
            echo "🚨 CRITICAL: Potential XSS vectors detected in active code!"
            echo "$XSS_VECTORS"
            echo "   Fix: Use textContent/createElement or React's built-in sanitization."
            exit 1
          fi
          
          echo "✅ S3.3: No XSS attack vectors found"

      - name: S3 Final Report
        if: always()
        run: |
          echo ""
          echo "╔═══════════════════════════════════════════════════════════════╗"
          echo "║           S3 INPUT VALIDATION GATE COMPLETE                   ║"
          echo "╚═══════════════════════════════════════════════════════════════╝"
