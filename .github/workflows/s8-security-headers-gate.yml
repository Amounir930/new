# ═══════════════════════════════════════════════════════════════
# S8 Security Headers Gate - XSS/CSRF Protection
# Refined Surgical Scans for Real Security Configurations
# ═══════════════════════════════════════════════════════════════

name: "🔒 S8 Security Headers Gate"

on:
  workflow_call:

permissions:
  contents: read
  checks: write

jobs:
  s8-security-headers-test:
    name: "S8 Security Headers Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "S8a - Helmet & Security Middleware Registration"
        run: |
          echo "🪖 Verifying Active Security Middleware Registration..."
          
          # [STRUCTURAL] Verify core security paths exist
          CORE_SEC="packages/middleware/src/security.ts"
          if [ ! -f "$CORE_SEC" ]; then echo "❌ Missing $CORE_SEC"; exit 1; fi
          
          # Check for helmet registration (excluding comments)
          HELMET_REG=$(grep -rE "app\.use\(helmet\(" packages apps --include="*.ts" 2>/dev/null | grep -vE "^\s*//" || true)
          
          if [ -z "$HELMET_REG" ]; then
            echo "🚨 CRITICAL: Helmet middleware registration not found in active code!"
            echo "❌ S8 FAILED: Missing essential security headers (Helmet)."
            exit 1
          fi
          
          # Check for security-downgrade patterns in Helmet
          HELMET_DOWNGRADE=$(grep -rE "contentSecurityPolicy\s*:\s*false|hsts\s*:\s*false" packages apps --include="*.ts" 2>/dev/null | grep -vE "^\s*//" || true)
          if [ -n "$HELMET_DOWNGRADE" ]; then
            echo "🚨 CRITICAL: Security features (CSP/HSTS) explicitly disabled in Helmet!"
            echo "$HELMET_DOWNGRADE"
            exit 1
          fi
          
          echo "✅ Helmet middleware actively registered"

      - name: "S8b - Restricted CORS Origin Check"
        run: |
          echo "🌐 Verifying CORS Restricted Origins..."
          
          # Detect wildcard origin '*' in active code
          WILDCARD_CORS=$(grep -rE "origin\s*:\s*['\"]\*['\"]|origin\s*:\s*true" packages apps --include="*.ts" --include="*.js" 2>/dev/null | grep -vE "^\s*//" || true)
          
          if [ -n "$WILDCARD_CORS" ]; then
            echo "🚨 CRITICAL: Wildcard CORS origin (*) detected in active code!"
            echo "$WILDCARD_CORS"
            echo "❌ S8 FAILED: Insecure CORS configuration."
            exit 1
          fi
          
          echo "✅ CORS configuration is restrictive (no wildcards)"

      - name: "S8c - Cookie Security (Secure & HttpOnly)"
        run: |
          echo "Cookie Security Attributes Audit..."
          
          # Detect security-downgrade in cooke settings
          BAD_COOKIES=$(grep -rE "secure\s*:\s*false|httpOnly\s*:\s*false" packages apps --include="*.ts" 2>/dev/null | grep -vE "^\s*//" || true)
          
          if [ -n "$BAD_COOKIES" ]; then
            echo "🚨 CRITICAL: Cookies explicitly configured as insecure (secure/httpOnly: false)!"
            echo "$BAD_COOKIES"
            echo "❌ S8 FAILED: Insecure cookie configuration."
            exit 1
          fi
          
          # Ensure cookies are actually secure if defined
          COOKIE_DEFS=$(grep -rE "res\.cookie\(|Set-Cookie" packages apps --include="*.ts" 2>/dev/null | grep -vE "^\s*//" || true)
          if [ -n "$COOKIE_DEFS" ]; then
            MISSING_SECURE=$(echo "$COOKIE_DEFS" | grep -vE "secure\s*:\s*true" || true)
            if [ -n "$MISSING_SECURE" ]; then
              echo "⚠️ WARNING: Potential insecure cookies (missing 'secure: true'):"
              echo "$MISSING_SECURE"
            fi
          fi
          
          echo "✅ Cookie security settings verified"

      - name: "S8d - CSP & Security Headers Presence"
        run: |
          echo "🛡️ Verifying CSP and Protocol Compliance..."
          
          # Scan for CSP header definitions or Helmet CSP options
          CSP_EXISTS=$(grep -rE "Content-Security-Policy|contentSecurityPolicy|csp" packages apps --include="*.ts" --include="*.js" 2>/dev/null | grep -vE "^\s*//" || true)
          
          if [ -z "$CSP_EXISTS" ]; then
            echo "🚨 CRITICAL: No CSP configuration found! XSS protection requires Content-Security-Policy."
            exit 1
          fi
          
          # Check for HSTS
          HSTS_EXISTS=$(grep -rE "Strict-Transport-Security|hsts" packages apps --include="*.ts" 2>/dev/null | grep -vE "^\s*//" || true)
          if [ -z "$HSTS_EXISTS" ]; then
            echo "🚨 CRITICAL: HSTS configuration not detected! Required for HTTPS enforcement."
            exit 1
          fi
          
          echo "✅ Security headers structural verification complete"

      - name: "S8e - CSRF Protection Check"
        run: |
          echo "🛡️ Verifying CSRF Protection..."
          
          # Scan for CSRF middleware or patterns (excluding comments)
          CSRF_ACTIVE=$(grep -rE "csrf|csurf|double-submit-cookie|double.csrf|CsrfProtection" packages apps --include="*.ts" 2>/dev/null | grep -vE "^\s*//" || true)
          
          if [ -z "$CSRF_ACTIVE" ]; then
            echo "🚨 CRITICAL: No active CSRF protection found!"
            echo "   Required: csrf middleware, double-submit-cookie, or CsrfProtection guard."
            exit 1
          fi
          
          echo "✅ S8e: CSRF protection verified in active code"

      - name: "S8 Summary Report"
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "✅ S8 SECURITY HEADERS GATE COMPLETED SUCCESSFULLY"
          echo "═══════════════════════════════════════════════════════════════"
