name: "🔐 S1 Environment Verification Gate"

on:
  workflow_call:

permissions:
  contents: read
  checks: write

env:
  DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
  MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
  MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}

jobs:
  s1-environment-verification:
    name: "S1 Environment Verification Security Test"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.45"

      - name: Install Dependencies
        run: bun install

      - name: "Fetch History for Gitleaks"
        run: |
          git fetch --prune --unshallow || git fetch --prune --depth=1000

      - name: "S1.1 - Secret Detection (Gitleaks)"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'

      - name: "S1.2 - Hardcoded Credentials & Secret Strength Scan"
        run: |
          echo "🔍 Scanning for hardcoded credentials (Surgical)..."
          
          # Detect password/secret assignments in strings (active code only)
          # Excludes comments, tests, and explicit safe marks
          HARDCODED=$(grep -rnE "(password|secret|apiKey|token)\s*=\s*['\"][^'\"]+['\"]" packages/*/src apps/*/src \
            --include="*.ts" 2>/dev/null | \
            grep -vE "^\s*//" | \
            grep -vE "(\.test\.|\.spec\.|// S1: safe)" || true)

          if [ -n "$HARDCODED" ]; then
            echo "🚨 CRITICAL: Hardcoded credentials found in active code!"
            echo "$HARDCODED"
            exit 1
          fi

          echo "🔐 S1.2: Hardcoded credentials check passed"

          echo "🔍 Verifying JWT_SECRET length (Min 32 chars)..."
          # Check JWT_SECRET in .env.example
          if [ -f ".env.example" ]; then
            JWT_VAL=$(grep "^JWT_SECRET=" .env.example | cut -d= -f2 | tr -d '"' | tr -d "'")
            JWT_LEN=${#JWT_VAL}
            echo "Found JWT_SECRET with length: $JWT_LEN"
            if [ $JWT_LEN -lt 32 ]; then
              echo "🚨 CRITICAL: JWT_SECRET in .env.example is too short (Found: $JWT_LEN, Min: 32)!"
              exit 1
            fi
          fi
          
          echo "✅ S1.2: JWT Secret strength verified"

      - name: "S1.3 - Environment vs Schema Consistency"
        run: |
          echo "🔍 Verifying .env.example vs @apex/config schema..."
          bun run tools/security-scripts/verify-env-config.ts

      - name: "S1.4 - Forbidden .env Commits"
        run: |
          echo "🔍 Checking for illegally committed .env files..."
          ENV_FILES=$(find . -name ".env" -not -path "*/node_modules/*" 2>/dev/null || true)

          if [ -n "$ENV_FILES" ]; then
            echo "🚨 CRITICAL: .env files found in repository!"
            echo "$ENV_FILES"
            exit 1
          fi
          
          echo "✅ S1.4: No .env files committed"

      - name: "S1.5 - Dependency Vulnerability Audit (Bun Audit)"
        run: |
          echo "🔍 Running supply chain security audit..."
          bun audit || {
            echo "❌ S1.5 FAILED: Known security vulnerabilities detected in dependencies!"
            exit 1
          }
          echo "✅ S1.5: Dependency audit passed"

      - name: S1 Final Report
        if: always()
        run: |
          echo ""
          echo "╔═══════════════════════════════════════════════════════════════╗"
          echo "║           S1 ENVIRONMENT VERIFICATION COMPLETE                ║"
          echo "╚═══════════════════════════════════════════════════════════════╝"
