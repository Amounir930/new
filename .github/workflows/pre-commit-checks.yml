# ═══════════════════════════════════════════════════════════════
# Pre-Commit Quality & Security Checks
# Runs on every PR to catch issues before merge
# ═══════════════════════════════════════════════════════════════

name: "🔍 Pre-Commit Checks"

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Code Quality Checks
  # ═══════════════════════════════════════════════════════════════
  code-quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.45"

      - name: Install Dependencies
        run: bun install

      - name: Build Workspace Packages
        run: |
          echo "🏗️ Building workspace packages..."
          bun run build || echo "Build completed with warnings"

      - name: TypeScript Type Check
        run: |
          echo "🔍 Verifying Export Module Integrity..."
          # Fail Fast if TSConfig is missing
          if [ ! -f "packages/export/tsconfig.json" ]; then
            echo "🚨 CRITICAL: packages/export/tsconfig.json is missing! Security Gate Breached."
            exit 1
          fi
          
          bunx tsc --noEmit --project packages/export/tsconfig.json
          echo "✅ Export types verified successfully"

      - name: Biome Lint Check
        run: |
          echo "🔍 Running Biome lint (Strict)..."
          bun run lint

      - name: Check Export Module Compilation
        if: contains(github.event.pull_request.changed_files || '', 'packages/export/') || github.event_name == 'push'
        run: |
          echo "🔍 Checking export module compilation..."
          cd packages/export
          # Try to compile
          bun build ./src/index.ts --outdir ./dist --target node 2>&1 | head -50
          echo "✅ Export module compilation check completed"

  # ═══════════════════════════════════════════════════════════════
  # Security Checks
  # ═══════════════════════════════════════════════════════════════
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security & Secret Detection (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.45"

      - name: Install Dependencies
        run: bun install

      - name: AST-Based Security Scan (S11 & S14)
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  Apex AST Security Scanner"
          echo "═══════════════════════════════════════════════════════════════"
          cd packages/security
          bun run security-scan


  # ═══════════════════════════════════════════════════════════════
  # Test Execution
  # ═══════════════════════════════════════════════════════════════
  run-tests:
    name: "Run Tests"
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.45"

      - name: Install Dependencies
        run: bun install

      - name: Build Workspace Dependencies
        run: |
          echo "🏗️ Building workspace dependencies..."
          # Build dependencies in order: db → audit → middleware → export
          bun run build --filter=@apex/db --filter=@apex/audit --filter=@apex/middleware || bun run build
          echo "✅ Workspace dependencies built"

      - name: Run Export Module Tests
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  Running Export Module Tests"
          echo "═══════════════════════════════════════════════════════════════"
          
          cd packages/export
          bun run test:coverage
          
          echo "✅ Export module tests completed"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          NODE_ENV: test

      - name: Check Test Coverage
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  Test Coverage Check"
          echo "═══════════════════════════════════════════════════════════════"
          
          # Check that export tests exist
          TEST_COUNT=$(find packages/export -name "*.test.ts" | wc -l)
          echo "Export test files: $TEST_COUNT"
          
          if [ "$TEST_COUNT" -lt 2 ]; then
            echo "❌ Minimum 2 test files required for export module"
            exit 1
          fi
          
          echo "✅ Test coverage requirement met"

  # ═══════════════════════════════════════════════════════════════
  # Documentation Check
  # ═══════════════════════════════════════════════════════════════
  docs-check:
    name: "Documentation Check"
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files || '', 'packages/export/') || github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Export Documentation
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  Export Documentation Check"
          echo "═══════════════════════════════════════════════════════════════"
          
          # Check README exists
          if [ ! -f "packages/export/README.md" ]; then
            echo "❌ Export module README.md is missing"
            exit 1
          fi
          
          # Check README has required sections
          README="packages/export/README.md"
          
          if ! grep -q "Security" "$README"; then
            echo "❌ README missing Security section"
            exit 1
          fi
          
          if ! grep -q "API\|Usage" "$README"; then
            echo "❌ README missing Usage/API section"
            exit 1
          fi
          
          if ! grep -q "S14\|Export Security" "$README"; then
            echo "⚠️ README should mention S14 compliance"
          fi
          
          echo "✅ Export documentation verified"

  # ═══════════════════════════════════════════════════════════════
  # Final Report
  # ═══════════════════════════════════════════════════════════════
  pre-commit-summary:
    name: "Pre-Commit Summary"
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, run-tests, docs-check]
    if: always()
    
    steps:
      - name: Generate Summary
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "           PRE-COMMIT CHECKS SUMMARY"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "Code Quality:      ${{ needs.code-quality.result }}"
          echo "Security Scan:     ${{ needs.security-scan.result }}"
          echo "Tests:             ${{ needs.run-tests.result }}"
          echo "Documentation:     ${{ needs.docs-check.result }}"
          echo ""
          
          if [ "${{ needs.code-quality.result }}" == "failure" ] || \
             [ "${{ needs.security-scan.result }}" == "failure" ] || \
             [ "${{ needs.run-tests.result }}" == "failure" ]; then
            echo "❌ PRE-COMMIT CHECKS FAILED"
            exit 1
          fi
          
          echo "✅ ALL PRE-COMMIT CHECKS PASSED"
          echo "═══════════════════════════════════════════════════════════════"
