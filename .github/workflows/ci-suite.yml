# ═══════════════════════════════════════════════════════════════
# Consolidated CI Suite (Fast, Integration, Main, Pre-commit, S15)
# 100% Parity with Original Workflows
# ═══════════════════════════════════════════════════════════════

name: "🚀 Apex CI Suite"

on:
  push:
    branches: [main, develop, New]
  pull_request:
    branches: [main, develop, New]
  workflow_dispatch:

env:
  # 🛡️ S1 Complexity Compliant Env Vars
  NODE_ENV: test
  JWT_SECRET: Secure_Jwt_Secret_32_Chars_Long_!!123
  DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
  REDIS_URL: redis://localhost:6379
  ENCRYPTION_MASTER_KEY: SuperSecureKey123!_Long_Enough_32
  MINIO_ENDPOINT: localhost
  MINIO_ACCESS_KEY: test_access_key
  MINIO_SECRET_KEY: test_secret_key

jobs:
  # 🧱 Static Analysis (Lint, Typecheck)
  static-analysis:
    name: "Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Type Check
        run: bun run typecheck

  # 🧪 Integration & Coverage Tests
  integration-tests:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: safe_user
          POSTGRES_PASSWORD: safe_pass
          POSTGRES_DB: apex_test
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
      - name: Build DB
        run: bun run build --filter=@apex/db
      - name: Run Tests
        run: bun test
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

  # 🚀 Main CI Logic (Original ci-main.yml)
  ci-main:
    name: "CI Main Workflow"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
      - name: Build all
        run: bun run build

  # 🛡️ S15: Active Defense & Honeypot
  active-defense:
    name: "S15 Active Defense"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
      - name: "Verify Honeypot Logic"
        run: grep -r "HONEYPOT_HIT" packages/audit/src || exit 1

  # 📦 Pre-commit Integration Check
  pre-commit-checks:
    name: "Pre-commit Integration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
      - name: Export Docs Check
        run: |
          if [ ! -f "packages/export/README.md" ]; then exit 1; fi
          grep -q "Security" packages/export/README.md
