name: "🗝️ S7 Encryption at Rest Gate"

on:
  workflow_call:

permissions:
  contents: read
  checks: write

env:
  DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
  ENCRYPTION_MASTER_KEY: ValidProdPass32CharsWith1$!Abc12
  NODE_ENV: test
  JWT_SECRET: test_secret_key_for_ci_environment_only_32
  MINIO_ENDPOINT: localhost
  MINIO_ACCESS_KEY: test_access_key
  MINIO_SECRET_KEY: test_secret_key

jobs:
  s7-encryption-test:
    name: "S7 Encryption at Rest Security Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: safe_user
          POSTGRES_PASSWORD: safe_pass
          POSTGRES_DB: apex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.45"

      - name: Install dependencies
        run: bun install

      - name: "S7.1 - Encryption Storage Integration Test"
        run: |
          echo "🧪 Running Vitest encryption storage tests..."
          DATABASE_URL=$DATABASE_URL bun run test:s7
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          POSTGRES_PASSWORD: postgres
          ENCRYPTION_MASTER_KEY: ValidTestKey32CharsWith1$!Abc1234
          NODE_ENV: test
          JWT_SECRET: test_secret_key_for_ci_environment_only_32
          MINIO_ACCESS_KEY: test_access_key
          MINIO_SECRET_KEY: test_secret_key

      - name: "S7.2 - Surgical Pattern Scan"
        run: |
          echo "🔍 Scanning for plaintext storage patterns (Surgical)..."
          
          # Detect use of non-encrypted storage for sensitive fields
          # Excludes the encryption service, tests, and legitimate log patterns
          PLAINTEXT=$(grep -rnE "(password|secret|apiKey|token)\s*=\s*['\"][^'\"]+['\"]" packages/*/src apps/*/src \
            --include="*.ts" 2>/dev/null | \
            grep -vE "^\s*//" | \
            grep -vE "(encryption\.ts|mock|\.test\.|\.spec\.|// S1: safe)" || true)

          if [ -n "$PLAINTEXT" ]; then
            echo "🚨 CRITICAL: Potential plaintext storage pattern detected!"
            echo "$PLAINTEXT"
            exit 1
          fi
          
          echo "✅ S7.2: No obvious plaintext storage patterns found"

      - name: "S7.3 - Seed Encrypted Data for Raw Inspection"
        run: |
          echo "🌱 Seeding encrypted data for raw-byte verification..."
          # Create a dedicated verification table and insert encrypted data
          # This ensures S7.3 NEVER relies on S7.1 test cleanup behavior
          psql $DATABASE_URL -c "
            CREATE TABLE IF NOT EXISTS public.s7_verification_data (
              id SERIAL PRIMARY KEY,
              label TEXT NOT NULL,
              encrypted_payload TEXT NOT NULL,
              created_at TIMESTAMP DEFAULT NOW()
            );
          "
          
          # Use the encryption service to store known plaintext
          cd packages/db
          # Use the dedicated seed script
          DATABASE_URL=$DATABASE_URL bun run scripts/seed-s7-verification.ts || {
            echo "⚠️ TypeScript seed failed, attempting fallback..."
            # Fallback: insert a raw marker that should NEVER appear if encryption works
            psql $DATABASE_URL -c "INSERT INTO public.s7_verification_data (label, encrypted_payload) VALUES ('s7_gate_test', 'FALLBACK_MARKER_ENCRYPTION_NOT_ACTIVE');"
          }
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          ENCRYPTION_MASTER_KEY: ValidTestKey32CharsWith1$!Abc1234
          NODE_ENV: test
          JWT_SECRET: test_secret_key_for_ci_environment_only_32
          MINIO_ACCESS_KEY: test_access_key
          MINIO_SECRET_KEY: test_secret_key

      - name: "S7.3 - Verification of Encrypted Bytes (Raw Storage Inspection)"
        run: |
          echo "🕵️ Inspecting Raw Database Bytes..."
          
          # Query the dedicated verification table (seeded in previous step)
          RAW_DATA=$(psql $DATABASE_URL -t -c "SELECT encrypted_payload FROM public.s7_verification_data WHERE label = 's7_gate_test' LIMIT 1;" 2>/dev/null || echo "")
          
          # Gate 1: Table/data MUST exist (no silent bypass)
          if [ -z "$(echo "$RAW_DATA" | tr -d '[:space:]')" ]; then
            echo "🚨 CRITICAL FAILURE: S7.3 verification data not found!"
            echo "   The seed step must have failed. This gate CANNOT be bypassed."
            exit 1
          fi
          
          # Gate 2: Raw data must NOT contain known plaintext markers
          KNOWN_MARKERS=("S7_VERIFICATION_SECRET_PLAINTEXT_2026" "MY_SUPER_SECRET_PII_DATA" "FALLBACK_MARKER_ENCRYPTION_NOT_ACTIVE")
          for marker in "${KNOWN_MARKERS[@]}"; do
            if [[ "$RAW_DATA" == *"$marker"* ]]; then
              echo "🚨 CRITICAL FAILURE: Data stored in PLAINTEXT! Marker '$marker' found in raw bytes."
              echo "   S7 Encryption at Rest is BREACHED."
              exit 1
            fi
          done
          
          echo "✅ S7.3: Raw storage verified - data is encrypted (no plaintext markers found)"
          
          # Cleanup verification table
          psql $DATABASE_URL -c "DROP TABLE IF EXISTS public.s7_verification_data;" 2>/dev/null || true
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: S7 Final Report
        if: always()
        run: |
          echo ""
          echo "╔═══════════════════════════════════════════════════════════════╗"
          echo "║           S7 ENCRYPTION AT REST GATE COMPLETE                 ║"
          echo "╚═══════════════════════════════════════════════════════════════╝"
