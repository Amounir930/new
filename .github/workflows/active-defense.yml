name: "🛡️ S15 - Active Defense & Honeypot"

on:
  push:
    branches: [main, develop, New]
  pull_request:
    branches: [main, develop, New]
  workflow_call:

jobs:
  honeypot-test:
    name: "S15 - Honeypot & Deception Testing"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      
      - name: Install Dependencies
        run: bun install
        
      - name: "Active Defense Simulation"
        run: |
          echo "🏹 Simulating SQLi Attack on Honeypot endpoint..."
          # Mock the behavior: Honeypot endpoint should log and block immediately
          # In a real scenario, we would start the API and curl it.
          # Here we verify the logic exists in the codebase.
          
          echo "[*] Verifying Honeypot registration in audit logs..."
          # Check if 'HONEYPOT_HIT' is a recognized event type
          if grep -r "HONEYPOT_HIT" packages/audit/src; then
            echo "✅ Honeypot event type found"
          else
            echo "❌ Missing 'HONEYPOT_HIT' audit event"
            exit 1
          fi
