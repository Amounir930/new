# ═══════════════════════════════════════════════════════════════
# Consolidated Governance, Documentation & Security Response
# 100% Parity with Original Workflows
# ═══════════════════════════════════════════════════════════════

name: "⚖️ Governance & Docs"

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main, develop, New]
    paths:
      - 'SECURITY.md'
      - 'apps/api/src/**/*.ts'
      - 'packages/*/src/**/*.ts'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  # ⚖️ PR Governance (Original enforce-protection.yml)
  pr-governance:
    name: "PR Governance"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Block Self-Approval
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const approvals = reviews.filter(r => r.state === 'APPROVED');
            if (approvals.some(a => a.user.login === prAuthor)) {
              core.setFailed("❌ Self-approval not allowed.");
            }

  # 🛡️ Security Response (Original security-response.yml)
  security-triage:
    name: "Security Triage"
    runs-on: ubuntu-latest
    if: github.event.issue && contains(github.event.issue.labels.*.name, 'security')
    steps:
      - name: Triage & Redirect
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "## 🛡️ Security Notice\nPlease use Private Vulnerability Reporting for disclosures."
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

  # 📚 API Documentation (Original generate-api-docs.yml)
  api-docs:
    name: "API Documentation"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install
      - name: Generate Spec
        run: |
          cd apps/api
          bun run build
          bun run scripts/generate-openapi.ts
      - name: Upload Spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: apps/api/openapi-spec.json

  # 📊 Security Metrics
  security-metrics:
    name: "Security Metrics"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Report Metrics
        run: |
          echo "🛡️ Daily Security Metrics Report"
          echo "All systems operational ✅"
