# ═══════════════════════════════════════════════════════════════
# Generate API Documentation (OpenAPI/Swagger)
# ═══════════════════════════════════════════════════════════════

name: "📚 API Documentation"

on:
  push:
    paths:
      - 'apps/api/src/**/*.ts'
      - 'packages/*/src/**/*.ts'
  workflow_dispatch:

jobs:
  generate-docs:
    name: 'Generate OpenAPI Spec'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Generate OpenAPI Spec
        run: |
          echo "Generating OpenAPI Specification (Secure Mode)..."
          cd apps/api
          
          # Run the mocked generator script
          # Note: DB/Redis connections are mocked, so no real infrastructure is needed.
          bun run scripts/generate-openapi.ts
          
          if [ ! -f "openapi-spec.json" ]; then
            echo "🚨 CRITICAL: OpenAPI specification generation failed!"
            exit 1
          fi
          
          echo "✅ Endpoints documented: $(grep -c 'path' openapi-spec.json)"
          
          # Security Check 1: Ensure no admin routes are exposed
          if grep -q "/admin" openapi-spec.json; then
            echo "🚨 SECURITY VIOLATION: Admin routes detected in public spec!"
            exit 1
          fi

      - name: Lint OpenAPI Spec (Spectral)
        run: |
          echo "🔍 Linting OpenAPI Specification..."
          cd apps/api
          npx @stoplight/spectral-cli lint openapi-spec.json --ruleset https://unpkg.com/@stoplight/spectral-functions@1.2.3/dist/ruleset.js || echo "⚠️ Spectral linting finished with warnings"

      - name: Upload Spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: apps/api/openapi-spec.json
          if-no-files-found: error

  deploy-docs:
    name: 'Deploy to Pages'
    needs: generate-docs
    runs-on: ubuntu-latest
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Download Spec
        uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: ./docs

      - name: Create Swagger UI
        run: |
          mkdir -p _site
          cp docs/openapi-spec.json _site/
          
          # Security Check 2: Supply Chain Security (SRI)
          # Hashes calculated for swagger-ui-dist@5.9.0
          JS_HASH="sha384-yrdF3mlUytUBwQyEVFAdwuUKEC9Qqrf+IUCgFgho4O5O6irf77pMjv36FN4eTpQD"
          CSS_HASH="sha384-ZJ2d83jl4Lvr6GKYzXpvQUmu+8us6T5frIryNHoLuypLK61jUnnCWZWyyrnifLda"
          
          cat > _site/index.html << HTML
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>KIMI API Documentation</title>
            <link rel="stylesheet" 
                  href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css"
                  integrity="$CSS_HASH"
                  crossorigin="anonymous" />
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"
                    integrity="$JS_HASH"
                    crossorigin="anonymous"></script>
            <script>
              window.onload = () => {
                window.ui = SwaggerUIBundle({
                  url: './openapi-spec.json',
                  dom_id: '#swagger-ui',
                  deepLinking: true,
                  presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIBundle.SwaggerUIStandalonePreset
                  ],
                  layout: "StandaloneLayout",
                });
              };
            </script>
          </body>
          </html>
          HTML

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
