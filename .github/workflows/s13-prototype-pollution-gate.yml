name: "🛡️ S13 Prototype Pollution Gate"

on:
  workflow_call:

permissions:
  contents: read
  checks: write

jobs:
  s13-prototype-test:
    name: "S13 Prototype Pollution Security Test"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.45"

      - name: Install dependencies
        run: bun install

      - name: "S13.1 - AST Prototype Pollution Scan"
        run: |
          echo "🔍 Running AST-based prototype pollution scanner..."
          bun run packages/security/src/utils/scanner-cli.ts --rule=s13-prototype packages apps
