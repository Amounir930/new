# Gitleaks configuration for APEX
# This file defines patterns for secret detection and false-positive management

[allowlist]
description = "Allowlisted entries for APEX"
paths = [
    '''(test|spec|mock|example)''',
    '''bun\.lock''',
    '''package\.json'''
]
# Add specific gitleaks:allow comments
stopwords = [
    "gitleaks:allow"
]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api[_-]?key|secret|token|password|passwd|pwd)[=:]\s*['"][A-Za-z0-9+/]{32,}['"]'''
entropy = 3.5
keywords = ["key", "api", "token", "secret", "password"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''
keywords = ["AKIA"]

[[rules]]
id = "github-pat"
description = "GitHub Personal Access Token"
regex = '''gh[pso]_[a-zA-Z0-9]{36}'''
keywords = ["ghp", "gho", "ghs", "ghu"]

[[rules]]
id = "stripe-secret-key"
description = "Stripe Secret Key"
regex = '''sk_live_[0-9a-zA-Z]{24}'''
keywords = ["sk_live"]

[[rules]]
id = "slack-webhook"
description = "Slack Webhook"
regex = '''https://hooks\.slack\.com/services/T[a-zA-Z0-9_]+/B[a-zA-Z0-9_]+/[a-zA-Z0-9_]+'''
keywords = ["hooks.slack.com"]
