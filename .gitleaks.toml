# Gitleaks Configuration for APEX 2026
# Mandatory Security Gate

[allowlist]
description = "Global allowlist"
paths = [
    "\\.env\\.example$",
    "\\.env\\.test$",
    "packages/security/src/utils/scanner-cli\\.ts",
    "scripts/test-s1\\.ts"
]
regexes = [
    '''postgresql://placeholder-user@localhost:5432/db_safe''',
    '''postgresql://placeholder-user:placeholder-password@localhost:5432/db_safe''',
    '''postgresql://postgres:postgres@localhost:5432/test''',
    '''postgresql://postgres:postgres@localhost:5432/apex_test''',
    '''postgresql://postgres:postgres@localhost:5432/db_safe''',
    '''postgresql://postgres:password@localhost:5432/prod_db''',
    '''mock-secret-for-docs-generation-only''',
    '''valid_secret_key_minimum_32_chars_long''',
    '''test_secret_key_for_ci_environment_only_32''',
    '''minio-test-secret-key-for-ci-only''',
    '''placeholder-password''',
    '''db_safe'''
]

[[rules]]
    id = "generic-secret"
    description = "Generic Secret"
    regex = '''(?i)(?:key|secret|token|password|auth|api)[-_]?(?:key|secret|token|password|auth|api)?\s*[:=]\s*['"]([0-9a-zA-Z]{16,})['"]'''
    severity = "error"

[[rules]]
    id = "postgres-connection-string"
    description = "Postgres Connection String"
    regex = '''postgres(?:ql)?://[a-zA-Z0-9_.-]+:[a-zA-Z0-9_.-]+@[a-zA-Z0-9_.-]+:\d+/[a-zA-Z0-9_.-]+'''
    severity = "error"
