version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════
  # Infrastructure
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v2.10
    container_name: apex-traefik-dev
    command:
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@60sec.shop"
      - "--certificatesresolvers.letsencrypt.acme.storage=/acme.json"
      - "--providers.file.filename=/traefik-dynamic.yml"
      - "--providers.file.watch=true"
    environment:
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}
    volumes:
      - ./ops/acme.json:/acme.json
      - ./ops/traefik-dynamic.yml:/traefik-dynamic.yml
    ports:
      - "80:80"
      - "443:443"
    networks:
      - apex-internal

  apex-postgres:
    image: pgvector/pgvector:pg15
    container_name: apex-postgres-dev
    env_file:
      - ops/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - apex-internal

  apex-redis:
    image: redis:7-alpine
    container_name: apex-redis-dev
    env_file:
      - ops/.env
    command: redis-server --requirepass "${REDIS_PASSWORD}" --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "[ -n \"$${REDIS_PASSWORD}\" ] && redis-cli -a \"$${REDIS_PASSWORD}\" ping || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - apex-internal

  apex-minio:
    image: minio/minio:latest
    container_name: apex-minio-dev
    command: server /data --console-address ":9001"
    env_file:
      - ops/.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_dev_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - apex-internal

  # ═══════════════════════════════════════════════════════════════
  # Bootstrap
  # ═══════════════════════════════════════════════════════════════
  bootstrap:
    image: oven/bun:1.1.25
    container_name: apex-bootstrap-dev
    working_dir: /app
    volumes:
      - ./:/app:delegated
      - nm_root:/app/node_modules
      - nm_api:/app/apps/api/node_modules
      - nm_store:/app/apps/store/node_modules
      - nm_merchant:/app/apps/merchant-admin/node_modules
      - nm_super:/app/apps/super-admin/node_modules
      - bun_global_cache:/root/.bun/install/cache
    command: bun install --ignore-scripts
    networks:
      - apex-internal

  # ═══════════════════════════════════════════════════════════════
  # Compute
  # ═══════════════════════════════════════════════════════════════
  api:
    image: oven/bun:1.1.25
    container_name: apex-api-dev
    working_dir: /app
    volumes:
      - ./:/app:delegated
      - nm_root:/app/node_modules
      - nm_api:/app/apps/api/node_modules
      - bun_global_cache:/root/.bun/install/cache
    env_file:
      - ops/.env
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      apex-postgres:
        condition: service_healthy
      apex-redis:
        condition: service_healthy
    command: sh -c "cd apps/api && bun run dev"
    networks:
      - apex-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apex-api-dev.rule=Host(`api.60sec.shop`)"
      - "traefik.http.routers.apex-api-dev.priority=20000"
      - "traefik.http.routers.apex-api-dev.entrypoints=websecure"
      - "traefik.http.routers.apex-api-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.apex-api-dev.loadbalancer.server.port=3000"
      - "traefik.docker.network=apex-internal"

  storefront:
    image: oven/bun:1.1.25
    container_name: apex-storefront-dev
    working_dir: /app
    volumes:
      - ./:/app:delegated
      - nm_root:/app/node_modules
      - nm_store:/app/apps/store/node_modules
      - bun_global_cache:/root/.bun/install/cache
    env_file:
      - ops/.env
    environment:
      NODE_ENV: development
      HUSKY: "0"
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api/v1
      INTERNAL_API_URL: http://api:3000/api/v1
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: bun x turbo run dev --filter=store
    networks:
      - apex-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apex-storefront-dev.rule=HostRegexp(`{host:.+}.60sec.shop`) || Host(`60sec.shop`)"
      - "traefik.http.routers.apex-storefront-dev.priority=20000"
      - "traefik.http.routers.apex-storefront-dev.entrypoints=websecure"
      - "traefik.http.routers.apex-storefront-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.apex-storefront-dev.loadbalancer.server.port=3002"
      - "traefik.docker.network=apex-internal"

  merchant-admin:
    image: oven/bun:1.1.25
    container_name: apex-merchant-admin-dev
    working_dir: /app
    volumes:
      - ./:/app:delegated
      - nm_root:/app/node_modules
      - nm_merchant:/app/apps/merchant-admin/node_modules
      - bun_global_cache:/root/.bun/install/cache
    env_file:
      - ops/.env
    environment:
      NODE_ENV: development
      HUSKY: "0"
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api/v1
      INTERNAL_API_URL: http://api:3000/api/v1
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: bun x turbo run dev --filter=merchant-admin
    networks:
      - apex-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apex-merchant-admin-dev.rule=Host(`admin.60sec.shop`)"
      - "traefik.http.routers.apex-merchant-admin-dev.priority=20000"
      - "traefik.http.routers.apex-merchant-admin-dev.entrypoints=websecure"
      - "traefik.http.routers.apex-merchant-admin-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.apex-merchant-admin-dev.loadbalancer.server.port=3001"
      - "traefik.docker.network=apex-internal"

  super-admin:
    image: oven/bun:1.1.25
    container_name: apex-super-admin-dev
    working_dir: /app
    volumes:
      - ./:/app:delegated
      - nm_root:/app/node_modules
      - nm_super:/app/apps/super-admin/node_modules
      - bun_global_cache:/root/.bun/install/cache
    env_file:
      - ops/.env
    environment:
      NODE_ENV: development
      HUSKY: "0"
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api/v1
      INTERNAL_API_URL: http://api:3000/api/v1
      PORT: 3001
    ports:
      - "3003:3001"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      api:
        condition: service_started
    command: bun x turbo run dev --filter=super-admin
    networks:
      - apex-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apex-super-admin-dev.rule=Host(`super-admin.60sec.shop`)"
      - "traefik.http.routers.apex-super-admin-dev.priority=20000"
      - "traefik.http.routers.apex-super-admin-dev.entrypoints=websecure"
      - "traefik.http.routers.apex-super-admin-dev.tls.certresolver=letsencrypt"
      - "traefik.http.services.apex-super-admin-dev.loadbalancer.server.port=3001"
      - "traefik.docker.network=apex-internal"

volumes:
  postgres_dev_data:
  minio_dev_data:
  bun_global_cache:
  nm_root:
  nm_api:
  nm_store:
  nm_merchant:
  nm_super:

networks:
  apex-internal:
    external: true
