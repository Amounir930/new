tls:
  options:
    default:
      sniStrict: false
http:
  middlewares:
    apex-security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
    apex-admin-ratelimit:
      rateLimit:
        average: 100
        burst: 50
    apex-api-ratelimit:
      rateLimit:
        average: 300
        burst: 100
    apex-global-ratelimit:
      rateLimit:
        average: 500
        burst: 200
    apex-basic-auth:
      basicAuth:
        usersFile: "/etc/traefik/htpasswd"
    apex-cf-allowlist:
      ipAllowList:
        sourceRange:
          - "173.245.48.0/20"
          - "103.21.244.0/22"
          - "103.22.200.0/22"
          - "103.31.4.0/22"
          - "141.101.64.0/18"
          - "108.162.192.0/18"
          - "190.93.240.0/20"
          - "188.114.96.0/20"
          - "197.234.240.0/22"
          - "198.41.128.0/17"
          - "162.158.0.0/15"
          - "104.16.0.0/13"
          - "104.24.0.0/14"
          - "172.64.0.0/13"
          - "131.0.72.0/22"
    apex-storage-cors:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlAllowHeaders:
          - "*"
        accessControlAllowOriginList:
          - "https://storage.60sec.shop"
          - "https://storage-admin.60sec.shop"
          - "https://admin.60sec.shop"
          - "https://super-admin.60sec.shop"
        accessControlMaxAge: 100
        addVaryHeader: true
    apex-dash-redirect:
      redirectRegex:
        regex: "^https://traefik.60sec.shop/$$"
        replacement: "https://traefik.60sec.shop/dashboard/"
    apex-api-version-bridge:
      redirectRegex:
        regex: "^https://api.60sec.shop/?$$"
        replacement: "https://api.60sec.shop/api/v1/health"
  # Static routers and services removed to prioritize Docker provider labels.
