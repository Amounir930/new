tls:
  options:
    default:
      sniStrict: false
http:
  middlewares:
    apex-security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
    apex-admin-ratelimit:
      rateLimit:
        average: 100
        burst: 50
    apex-api-ratelimit:
      rateLimit:
        average: 300
        burst: 100
    apex-global-ratelimit:
      rateLimit:
        average: 500
        burst: 200
    apex-store-csp:
      headers:
        contentSecurityPolicy: "default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;"
    apex-basic-auth:
      basicAuth:
        usersFile: "/etc/traefik/htpasswd"
    apex-cf-allowlist:
      ipWhiteList:
        sourceRange:
          - "173.245.48.0/20"
          - "103.21.244.0/22"
          - "103.22.200.0/22"
          - "103.31.4.0/22"
          - "141.101.64.0/18"
          - "108.162.192.0/18"
          - "190.93.240.0/20"
          - "188.114.96.0/20"
          - "197.234.240.0/22"
          - "198.41.128.0/17"
          - "162.158.0.0/15"
          - "104.16.0.0/13"
          - "104.24.0.0/14"
          - "172.64.0.0/13"
          - "131.0.72.0/22"
    apex-storage-cors:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
          - "PUT"
        accessControlAllowHeaders:
          - "*"
        accessControlAllowOriginList:
          - "https://storage.60sec.shop"
          - "https://storage-admin.60sec.shop"
          - "https://admin.60sec.shop"
          - "https://super-admin.60sec.shop"
        accessControlMaxAge: 100
        addVaryHeader: true
    apex-dash-redirect:
      redirectRegex:
        regex: '^https://traefik.60sec.shop/$'
        replacement: 'https://traefik.60sec.shop/dashboard/'
    apex-api-version-bridge:
      redirectRegex:
        regex: '^https://api.60sec.shop/?$'
        replacement: 'https://api.60sec.shop/api/v1/health'
  # ═══════════════════════════════════════════════════════════════
  # DECOUPLING LAYER: Static Routers & Services
  # Bypasses Docker Provider handshake bugs on Engine 29.3
  # ═══════════════════════════════════════════════════════════════

  routers:
    # Merchant Admin
    merchant-admin-http:
      rule: "Host(`admin.60sec.shop`)"
      priority: 100
      entryPoints:
        - web
      service: merchant-admin-svc
    merchant-admin-https:
      rule: "Host(`admin.60sec.shop`)"
      priority: 100
      entryPoints:
        - websecure
      service: merchant-admin-svc
      tls:
        certResolver: letsencrypt

    # Super Admin
    super-admin-http:
      rule: "Host(`super-admin.60sec.shop`)"
      priority: 100
      entryPoints:
        - web
      service: super-admin-svc
    super-admin-https:
      rule: "Host(`super-admin.60sec.shop`)"
      priority: 100
      entryPoints:
        - websecure
      service: super-admin-svc
      tls:
        certResolver: letsencrypt

    # API
    api-http:
      rule: "Host(`api.60sec.shop`)"
      priority: 100
      entryPoints:
        - web
      service: api-svc
    api-https:
      rule: "Host(`api.60sec.shop`)"
      priority: 100
      entryPoints:
        - websecure
      service: api-svc
      tls:
        certResolver: letsencrypt

    # MinIO Storage
    storage-http:
      rule: "Host(`storage.60sec.shop`)"
      priority: 100
      entryPoints:
        - web
      service: storage-svc
    storage-https:
      rule: "Host(`storage.60sec.shop`)"
      priority: 100
      entryPoints:
        - websecure
      service: storage-svc
      tls:
        certResolver: letsencrypt
      middlewares:
        - apex-storage-cors@file

    # MinIO Console
    storage-admin-http:
      rule: "Host(`storage-admin.60sec.shop`)"
      priority: 100
      entryPoints:
        - web
      service: storage-admin-svc
    storage-admin-https:
      rule: "Host(`storage-admin.60sec.shop`)"
      priority: 100
      entryPoints:
        - websecure
      service: storage-admin-svc
      tls:
        certResolver: letsencrypt

    # Database (Adminer)
    db-http:
      rule: "Host(`db.60sec.shop`)"
      priority: 100
      entryPoints:
        - web
      service: db-svc
    db-https:
      rule: "Host(`db.60sec.shop`)"
      priority: 100
      entryPoints:
        - websecure
      service: db-svc
      tls:
        certResolver: letsencrypt
      middlewares:
        - apex-cf-allowlist@file
        - apex-basic-auth@file

    # Traefik Dashboard
    traefik-http:
      rule: "Host(`traefik.60sec.shop`)"
      priority: 100
      entryPoints:
        - web
      service: traefik-svc
      middlewares:
        - apex-dash-redirect@file
    traefik-https:
      rule: "Host(`traefik.60sec.shop`)"
      priority: 100
      entryPoints:
        - websecure
      service: traefik-svc
      tls:
        certResolver: letsencrypt
      middlewares:
        - apex-basic-auth@file

    # Storefront (Main & Subdomains) - Low Priority
    store-http:
      rule: "Host(`60sec.shop`) || HostRegexp(`{subdomain:[a-z0-9-]+}.60sec.shop`)"
      priority: 10
      entryPoints:
        - web
      service: store-svc
    store-https:
      rule: "Host(`60sec.shop`) || HostRegexp(`{subdomain:[a-z0-9-]+}.60sec.shop`)"
      priority: 10
      entryPoints:
        - websecure
      service: store-svc
      tls:
        certResolver: letsencrypt
      middlewares:
        - apex-store-csp@file
        - apex-global-ratelimit@file

  services:
    merchant-admin-svc:
      loadBalancer:
        servers:
          - url: "http://apex-merchant-admin:3001"
    super-admin-svc:
      loadBalancer:
        servers:
          - url: "http://apex-super-admin:3001"
    api-svc:
      loadBalancer:
        servers:
          - url: "http://ops-api-1:3000"
          - url: "http://ops-api-2:3000"
    storage-svc:
      loadBalancer:
        servers:
          - url: "http://apex-minio:9000"
    storage-admin-svc:
      loadBalancer:
        servers:
          - url: "http://apex-minio:9001"
    db-svc:
      loadBalancer:
        servers:
          - url: "http://apex-adminer:8080"
    traefik-svc:
      loadBalancer:
        servers:
          - url: "http://apex-traefik-v2:8080"
    store-svc:
      loadBalancer:
        servers:
          - url: "http://apex-store:3002"
