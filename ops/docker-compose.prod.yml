services:
  # ═══════════════════════════════════════════════════════════════
  # Database Layer (PostgreSQL 15)
  # Tier: apex-data (ISOLATED)
  # ═══════════════════════════════════════════════════════════════
  apex-postgres:
    # ZERO-TOLERANCE FIX: No 'latest' tags. Pinned to specific minor version.
    build:
      context: ..
      dockerfile: ops/postgres.Dockerfile
    container_name: apex-postgres
    restart: always
    user: "70:70" # Run as postgres user internally
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-apex_v2}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - apex-data
    # ZERO-TOLERANCE FIX: PIDs limit to prevent Fork Bomb Kernel panics
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
          pids: 200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════
  # Cache Layer (Redis 7)
  # Tier: apex-data (ISOLATED)
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: always
    user: "999:1000" # Non-root redis user
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - apex-data

  # ═══════════════════════════════════════════════════════════════
  # Object Storage (MinIO)
  # Tier: apex-data + apex-public
  # ═══════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z # ZERO-TOLERANCE FIX: Pinned recent stable version
    container_name: apex-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: "https://admin.60sec.shop,https://*.60sec.shop"
      MINIO_BROWSER_REDIRECT_URL: https://storage-admin.60sec.shop
      # MINIO_DOMAIN: storage.60sec.shop
      MINIO_ROOT_USER_FILE: ""
      MINIO_ROOT_PASSWORD_FILE: ""
    volumes:
      - minio_data:/data
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-c", "echo > /dev/tcp/localhost/9000"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          pids: 200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=apex-internal"
      - "traefik.http.routers.minio.rule=Host(`storage.60sec.shop`)"
      - "traefik.http.routers.minio.priority=5000"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio.middlewares=apex-storage-cors@file"
      - "traefik.http.routers.minio.service=apex-minio"
      - "traefik.http.services.apex-minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`storage-admin.60sec.shop`)"
      - "traefik.http.routers.minio-console.priority=5500"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.service=apex-minio-console"
      - "traefik.http.services.apex-minio-console.loadbalancer.server.port=9001"
    networks:
      - apex-data
      - apex-public
      - apex-internal

  # ═══════════════════════════════════════════════════════════════
  # Application API (NestJS)
  # Tier: apex-internal + apex-data
  # ═══════════════════════════════════════════════════════════════
  api:
    # image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/api:latest
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: always
    env_file: .env
    depends_on:
      apex-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /home/node:noexec,nosuid,size=10m
    environment:
      NODE_ENV: production
      MINIO_ENDPOINT: http://apex-minio:9000
      PGHOST: apex-postgres
      DB_SSL: "false"
      DB_SSL_OPTIONAL: "true"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-apex}:${POSTGRES_PASSWORD}@apex-postgres:5432/${POSTGRES_DB:-apex_v2}?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@apex-redis:6379"
      PGUSER: ${POSTGRES_USER:-apex}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-apex_v2}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      BLIND_INDEX_PEPPER: ${BLIND_INDEX_PEPPER}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
      SESSION_SALT: ${SESSION_SALT}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-apex-assets}
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_SOURCE_URL: http://apex-minio:9000
      APP_DOMAIN: ${APP_DOMAIN:-60sec.shop}
      APP_ROOT_DOMAIN: ${APP_ROOT_DOMAIN:-60sec.shop}
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SKIP_S1_COMPLEXITY_CHECK: "true"
    networks:
      - apex-internal
      - apex-data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=apex-internal"
      - "traefik.http.routers.api-public.rule=Host(`api.60sec.shop`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-public.priority=5500"
      - "traefik.http.routers.api-public.entrypoints=websecure"
      - "traefik.http.routers.api-public.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-public.middlewares=apex-api-version-bridge@file,apex-api-ratelimit@file,apex-security-headers@file"
      - "traefik.http.routers.api-public.service=apex-api"
      - "traefik.http.routers.api-shielded.rule=Host(`api.60sec.shop`) || Host(`blue.60sec.shop`) || Host(`green.60sec.shop`)"
      - "traefik.http.routers.api-shielded.priority=5000"
      - "traefik.http.routers.api-shielded.entrypoints=websecure"
      - "traefik.http.routers.api-shielded.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-shielded.middlewares=apex-api-ratelimit@file,apex-basic-auth@file,apex-security-headers@file"
      - "traefik.http.routers.api-shielded.service=apex-api"
      - "traefik.http.services.apex-api.loadbalancer.server.port=3000"

      # Global middlewares migrated to traefik-dynamic.yml

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3000/api/v1/health', { headers: { 'X-Internal-Secret': '${INTERNAL_API_SECRET}' } }).then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          pids: 100
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════
  # Dedicated Background Worker (NestJS)
  # Tier: apex-internal + apex-data
  # ═══════════════════════════════════════════════════════════════
  worker:
    # image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/api:latest
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: always
    env_file: .env
    depends_on:
      apex-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m # Larger tmp for exports
      - /home/node:noexec,nosuid,size=10m
    environment:
      NODE_ENV: production
      ENABLE_WORKERS: "true"
      MINIO_ENDPOINT: http://apex-minio:9000
      PGHOST: apex-postgres
      DB_SSL: "false"
      DB_SSL_OPTIONAL: "true"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-apex}:${POSTGRES_PASSWORD}@apex-postgres:5432/${POSTGRES_DB:-apex_v2}?sslmode=disable"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@apex-redis:6379"
      PGUSER: ${POSTGRES_USER:-apex}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-apex_v2}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      BLIND_INDEX_PEPPER: ${BLIND_INDEX_PEPPER}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
      SESSION_SALT: ${SESSION_SALT}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-apex-assets}
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_SOURCE_URL: http://apex-minio:9000
      APP_DOMAIN: ${APP_DOMAIN:-60sec.shop}
      APP_ROOT_DOMAIN: ${APP_ROOT_DOMAIN:-60sec.shop}
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SKIP_S1_COMPLEXITY_CHECK: "true"
    command: ["/bin/sh", "-c", "bun $(find dist -name worker.js | head -n 1)"]
    networks:
      - apex-internal
      - apex-data
    healthcheck:
      test: ["CMD-SHELL", "pidof bun || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
          pids: 100
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════
  # Frontends (Store, Admin, Super-Admin)
  # ═══════════════════════════════════════════════════════════════
  merchant-admin:
    # image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/merchant-admin:latest
    build:
      context: ..
      dockerfile: apps/merchant-admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.60sec.shop/api/v1}
    container_name: apex-merchant-admin
    restart: always
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /app/apps/merchant-admin/.next/cache:uid=1000,gid=1000,size=100m
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api/v1
      JWT_SECRET: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: apex-merchant-admin
    networks:
      - apex-public
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=apex-public"
      - "traefik.http.routers.merchant-admin.rule=Host(`admin.60sec.shop`)"
      - "traefik.http.routers.merchant-admin.priority=4000"
      - "traefik.http.routers.merchant-admin.entrypoints=websecure"
      - "traefik.http.routers.merchant-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.merchant-admin.middlewares=apex-admin-ratelimit@file,apex-security-headers@file"
      - "traefik.http.routers.merchant-admin.service=apex-merchant-admin"
      - "traefik.http.services.apex-merchant-admin.loadbalancer.server.port=3001"
      - "traefik.http.routers.merchant-tenant.rule=(HostRegexp(`{subdomain:[a-z0-9-]+}.60sec.shop`) || Host(`60sec.shop`)) && (PathPrefix(`/dashboard`) || PathPrefix(`/orders`) || PathPrefix(`/onboarding`) || PathPrefix(`/login`))"
      - "traefik.http.routers.merchant-tenant.priority=4500"
      - "traefik.http.routers.merchant-tenant.entrypoints=websecure"
      - "traefik.http.routers.merchant-tenant.tls.certresolver=letsencrypt"
      - "traefik.http.routers.merchant-tenant.middlewares=apex-admin-ratelimit@file,apex-security-headers@file"
      - "traefik.http.routers.merchant-tenant.service=apex-merchant-admin"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3001/').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  super-admin:
    # image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/super-admin:latest
    build:
      context: ..
      dockerfile: apps/super-admin/Dockerfile
    container_name: apex-super-admin
    restart: always
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /app/apps/super-admin/.next/cache:uid=1000,gid=1000,size=100m
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api/v1
      SUPER_ADMIN_KEY: ${SUPER_ADMIN_KEY}
      SUPER_ADMIN_KEY_HEADER: X-Super-Admin-Key
      JWT_SECRET: ${JWT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: apex-super-admin
    networks:
      - apex-public
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=apex-public"
      - "traefik.http.routers.super-admin.rule=Host(`super-admin.60sec.shop`)"
      - "traefik.http.routers.super-admin.priority=5000"
      - "traefik.http.routers.super-admin.entrypoints=websecure"
      - "traefik.http.routers.super-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.super-admin.middlewares=apex-admin-ratelimit@file,apex-security-headers@file"
      - "traefik.http.routers.super-admin.service=apex-super-admin"
      - "traefik.http.services.apex-super-admin.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3001/').then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  store:
    # image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/store:latest
    build:
      context: ..
      dockerfile: apps/store/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.60sec.shop/api/v1}
    container_name: apex-store
    restart: always
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /app/apps/store/.next/cache:uid=1000,gid=1000,size=100m
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api/v1
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_URL: http://api:3000/api/v1
      PORT: 3002
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: apex-store
    networks:
      - apex-public
      - apex-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=apex-public"
      - "traefik.http.routers.store-main.rule=Host(`60sec.shop`) || Host(`adel.60sec.shop`) || HostRegexp(`{subdomain:[a-z0-9-]+}.60sec.shop`)"
      - "traefik.http.routers.store-main.priority=3000"
      - "traefik.http.routers.store-main.entrypoints=websecure"
      - "traefik.http.routers.store-main.tls.certresolver=letsencrypt"
      - "traefik.http.routers.store-main.middlewares=apex-store-csp@file,apex-global-ratelimit@file"
      - "traefik.http.routers.store-main.service=apex-store"
      - "traefik.http.services.apex-store.loadbalancer.server.port=3002"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://127.0.0.1:3002/', { headers: { 'X-Internal-Secret': '${INTERNAL_API_SECRET}' } }).then(()=>process.exit(0)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════
  # Docker Socket Proxy
  # ═══════════════════════════════════════════════════════════════
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: apex-docker-proxy
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - EVENTS=1
      - INFO=1
      - VERSION=1
      - SERVICES=0
      - TASKS=0
      - EXEC=0
      - POST=0
    networks:
      - apex-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2375"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          pids: 50
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════
  # Traefik (Reverse Proxy)
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:2.11.10
    container_name: apex-traefik
    user: root
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      docker-proxy:
        condition: service_healthy
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--metrics.prometheus=true"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--ping=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,188.114.96.0/20,190.93.240.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - "DOCKER_API_VERSION=1.41"
      - "CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}"
      - "CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN}"
      - "CLOUDFLARE_ZONE_API_TOKEN=${CLOUDFLARE_ZONE_API_TOKEN}"
    volumes:
      # HTpasswd converted to docker secret where applicable, but for Traefik we can mount directly securely
      - ./htpasswd:/etc/traefik/htpasswd:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
      - ./logs/traefik:/var/log/traefik
      - ./traefik-dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-middlewares.rule=Host(`localhost`)"
      - "traefik.http.routers.traefik-middlewares.entrypoints=web"
      - "traefik.http.routers.traefik-middlewares.service=api@internal"
      - "traefik.http.routers.traefikdash.rule=Host(`traefik.60sec.shop`)"
      - "traefik.http.routers.traefikdash.priority=6000"
      - "traefik.http.routers.traefikdash.service=api@internal"
      - "traefik.http.routers.traefikdash.entrypoints=websecure"
      - "traefik.http.routers.traefikdash.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefikdash.middlewares=apex-cf-allowlist@file,apex-dash-redirect@file,apex-basic-auth@file"
    deploy:
      resources:
        limits:
          pids: 150
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - apex-public
      - apex-internal
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # Backups (Postgres & Gitea)
  # ═══════════════════════════════════════════════════════════════
  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: apex-db-backup
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: apex-postgres
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-apex_v2}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    volumes:
      - db_backups:/backups
    deploy:
      resources:
        limits:
          pids: 50
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - apex-data

  # ═══════════════════════════════════════════════════════════════
  # Database Management UI (Adminer)
  # ═══════════════════════════════════════════════════════════════
  adminer:
    image: adminer:latest
    container_name: apex-adminer
    restart: always
    environment:
      ADMINER_DEFAULT_SERVER: apex-postgres
    networks:
      - apex-data
      - apex-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=apex-public"
      - "traefik.http.routers.adminer.rule=Host(`db.60sec.shop`)"
      - "traefik.http.routers.adminer.priority=5000"
      - "traefik.http.routers.adminer.entrypoints=websecure"
      - "traefik.http.routers.adminer.tls.certresolver=letsencrypt"
      - "traefik.http.routers.adminer.middlewares=apex-cf-allowlist@file,apex-basic-auth@file"
      - "traefik.http.services.apex-adminer.loadbalancer.server.port=8080"


  # ═══════════════════════════════════════════════════════════════
  # High-Performance Catalog Search (Meilisearch)
  # ═══════════════════════════════════════════════════════════════
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: apex-meilisearch
    restart: always
    env_file: .env
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - apex-internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════
  # Dynamic Image Optimization (Imgproxy)
  # ═══════════════════════════════════════════════════════════════
  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: apex-imgproxy
    restart: always
    env_file: .env
    environment:
      - IMGPROXY_KEY=${IMGPROXY_KEY}
      - IMGPROXY_SALT=${IMGPROXY_SALT}
      - IMGPROXY_MAX_SRC_RESOLUTION=50
      - IMGPROXY_MAX_SRC_FILE_SIZE=20971520 # 20MB
      - IMGPROXY_BIND=:8080
    networks:
      - apex-internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════
  # Distributed Tracing (OpenTelemetry Collector)
  # ═══════════════════════════════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: apex-otel-collector
    restart: always
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - apex-internal
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config", "/etc/otelcol-contrib/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

# ══════════════════════════════════════════════════════════════
# جميع الأسرار تُقرأ حصراً من ملف .env (المصدر الوحيد للحقيقة)
# لا توجد docker secrets — .env هو الكتاب المقدس
# ══════════════════════════════════════════════════════════════

volumes:
  postgres_data:
  redis_data:
  minio_data:
  gitea_data:
  gitea_conf:
  letsencrypt_data:
  gitea_db_data:
  gitea_backups:
  db_backups:
  meilisearch_data:

networks:
  apex-public:
    external: true
  apex-internal:
    external: true
  apex-data:
    external: true
