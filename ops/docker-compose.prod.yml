services:
  # ═══════════════════════════════════════════════════════════════
  # Database Layer (PostgreSQL 15)
  # Tier: apex-data (ISOLATED)
  # ═══════════════════════════════════════════════════════════════
  apex-postgres:
    # ZERO-TOLERANCE FIX: No 'latest' tags. Pinned to specific minor version.
    image: postgres:15-alpine
    container_name: apex-postgres
    restart: always
    user: "70:70" # Run as postgres user internally
    # ZERO-TOLERANCE FIX: Read via secrets, no environment exposure.
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-apex_v2}
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - apex-data
    # ZERO-TOLERANCE FIX: PIDs limit to prevent Fork Bomb Kernel panics
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
          pids: 200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════
  # Cache Layer (Redis 7)
  # Tier: apex-data (ISOLATED)
  # ═══════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: apex-redis
    restart: always
    user: "999:1000" # Non-root redis user
    # ZERO-TOLERANCE FIX: Do not pass password in CLI args (ps aux leak). Read securely from file.
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$(cat /run/secrets/redis_password)\""]
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$(cat /run/secrets/redis_password)\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - apex-data

  # ═══════════════════════════════════════════════════════════════
  # Object Storage (MinIO)
  # Tier: apex-data + apex-public
  # ═══════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z # ZERO-TOLERANCE FIX: Pinned version
    container_name: apex-minio
    restart: always
    command: server /data --console-address ":9001"
    # ZERO-TOLERANCE FIX: Root password via secrets.
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_password
      MINIO_SERVER_URL: https://storage.60sec.shop
      MINIO_BROWSER_REDIRECT_URL: https://storage-admin.60sec.shop
      MINIO_DOMAIN: storage.60sec.shop
    secrets:
      - minio_password
    volumes:
      - minio_data:/data
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          pids: 200
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=apex-internal"
      - "traefik.http.routers.minio.rule=Host(`storage.60sec.shop`)"
      - "traefik.http.routers.minio.priority=5000"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio.middlewares=apex-internal-allowlist@file"
      - "traefik.http.routers.minio.service=apex-minio"
      - "traefik.http.services.apex-minio.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-console.rule=Host(`storage-admin.60sec.shop`)"
      - "traefik.http.routers.minio-console.priority=5500"
      - "traefik.http.routers.minio-console.entrypoints=websecure"
      - "traefik.http.routers.minio-console.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio-console.middlewares=apex-minio-headers@file"
      - "traefik.http.routers.minio-console.service=apex-minio-console"
      - "traefik.http.services.apex-minio-console.loadbalancer.server.port=9001"
    networks:
      - apex-data
      - apex-public
      - apex-internal

  # ═══════════════════════════════════════════════════════════════
  # Application API (NestJS)
  # Tier: apex-internal + apex-data
  # ═══════════════════════════════════════════════════════════════
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/api:latest
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: always
    # ZERO-TOLERANCE FIX: Removed 'env_file: ../.env' completely to prevent LFI full compromise.
    depends_on:
      apex-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    user: "1000:1000" # ZERO-TOLERANCE FIX: Run as non-root user
    read_only: true   # ZERO-TOLERANCE FIX: Immutable filesystem
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /home/node:noexec,nosuid,size=10m
    environment:
      NODE_ENV: production
      DB_SSL: ${DB_SSL:-false}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-apex-assets}
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      ENCRYPTION_MASTER_KEY_FILE: /run/secrets/encryption_master_key
      API_KEY_SECRET_FILE: /run/secrets/api_key_secret
      BLIND_INDEX_PEPPER_FILE: /run/secrets/blind_index_pepper
      SESSION_SALT_FILE: /run/secrets/session_salt
      INTERNAL_API_SECRET_FILE: /run/secrets/internal_api_secret
      SUPER_ADMIN_PASSWORD_FILE: /run/secrets/super_admin_password
    secrets:
      - jwt_secret
      - postgres_password
      - redis_password
      - encryption_master_key
      - api_key_secret
      - blind_index_pepper
      - session_salt
      - internal_api_secret
      - super_admin_password
    networks:
      - apex-internal
      - apex-data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=apex-internal"
      - "traefik.http.routers.api-public.rule=Host(`api.60sec.shop`) && (PathPrefix(`/api/v1`) || PathPrefix(`/api/auth`))"
      - "traefik.http.routers.api-public.priority=5500"
      - "traefik.http.routers.api-public.entrypoints=websecure"
      - "traefik.http.routers.api-public.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-public.middlewares=apex-api-ratelimit@file,apex-saas-cors@file,apex-security-headers@file"
      - "traefik.http.routers.api-shielded.rule=Host(`api.60sec.shop`) || Host(`blue.60sec.shop`) || Host(`green.60sec.shop`)"
      - "traefik.http.routers.api-shielded.priority=5000"
      - "traefik.http.routers.api-shielded.entrypoints=websecure"
      - "traefik.http.routers.api-shielded.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api-shielded.middlewares=apex-api-ratelimit@file,apex-basic-auth@file,apex-security-headers@file"
      - "traefik.http.services.apex-api.loadbalancer.server.port=3000"

      # Global middlewares migrated to traefik-dynamic.yml

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          pids: 100
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════
  # Frontends (Store, Admin, Super-Admin)
  # ═══════════════════════════════════════════════════════════════
  merchant-admin:
    image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/merchant-admin:latest
    container_name: apex-merchant-admin
    restart: always
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api
      JWT_SECRET_FILE: /run/secrets/jwt_secret
    secrets:
      - jwt_secret
    networks:
      - apex-public
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.merchant-admin.rule=Host(`admin.60sec.shop`)"
      - "traefik.http.routers.merchant-admin.priority=4000"
      - "traefik.http.routers.merchant-admin.entrypoints=websecure"
      - "traefik.http.routers.merchant-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.merchant-admin.middlewares=apex-admin-ratelimit@file,apex-security-headers@file"
      - "traefik.http.services.apex-merchant-admin.loadbalancer.server.port=3001"
      - "traefik.http.routers.merchant-tenant.rule=(HostRegexp(`{subdomain:[a-z0-9-]+}.60sec.shop`) || Host(`60sec.shop`)) && (PathPrefix(`/dashboard`) || PathPrefix(`/orders`) || PathPrefix(`/onboarding`) || PathPrefix(`/login`))"
      - "traefik.http.routers.merchant-tenant.priority=4500"
      - "traefik.http.routers.merchant-tenant.entrypoints=websecure"
      - "traefik.http.routers.merchant-tenant.tls.certresolver=letsencrypt"
      - "traefik.http.routers.merchant-tenant.middlewares=apex-admin-ratelimit@file,apex-security-headers@file"
      - "traefik.http.routers.merchant-tenant.service=apex-merchant-admin"
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  super-admin:
    image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/super-admin:latest
    container_name: apex-super-admin
    restart: always
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api
      JWT_SECRET_FILE: /run/secrets/jwt_secret
    secrets:
      - jwt_secret
    networks:
      - apex-public
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.super-admin.rule=Host(`super-admin.60sec.shop`)"
      - "traefik.http.routers.super-admin.priority=5000"
      - "traefik.http.routers.super-admin.entrypoints=websecure"
      - "traefik.http.routers.super-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.super-admin.middlewares=apex-admin-ratelimit@file,apex-security-headers@file"
      - "traefik.http.services.apex-super-admin.loadbalancer.server.port=3001"
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  store:
    image: ghcr.io/${GITHUB_REPOSITORY:-amounir930/adel}/store:latest
    container_name: apex-store
    restart: always
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.60sec.shop/api
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      INTERNAL_API_URL: http://api:3000/api
      PORT: 3002
    secrets:
      - jwt_secret
    networks:
      - apex-public
      - apex-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.store-main.rule=Host(`60sec.shop`) || Host(`adel.60sec.shop`)"
      - "traefik.http.routers.store-main.priority=3000"
      - "traefik.http.routers.store-main.entrypoints=websecure"
      - "traefik.http.routers.store-main.tls.certresolver=letsencrypt"
      - "traefik.http.routers.store-main.middlewares=apex-store-csp@file,apex-global-ratelimit@file"
      - "traefik.http.services.apex-store.loadbalancer.server.port=3002"
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════
  # Docker Socket Proxy
  # ═══════════════════════════════════════════════════════════════
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: apex-docker-proxy
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - EVENTS=1
      - INFO=1
      - VERSION=1
      - SERVICES=0
      - TASKS=0
      - EXEC=0
      - POST=0
    networks:
      - apex-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2375"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64M
          pids: 50
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════════════
  # Traefik (Reverse Proxy)
  # ═══════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v2.11
    container_name: apex-traefik
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      docker-proxy:
        condition: service_healthy
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.endpoint=tcp://apex-docker-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=apex-internal"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--metrics.prometheus=true"
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - "DOCKER_API_VERSION=1.44"
      - "CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}"
      # ZERO-TOLERANCE FIX: Cloudflare tokens mapped through files
      - "CLOUDFLARE_DNS_API_TOKEN_FILE=/run/secrets/cf_dns_token"
      - "CLOUDFLARE_ZONE_API_TOKEN_FILE=/run/secrets/cf_zone_token"
    secrets:
      - cf_dns_token
      - cf_zone_token
    volumes:
      # HTpasswd converted to docker secret where applicable, but for Traefik we can mount directly securely
      - ./htpasswd:/etc/traefik/htpasswd:ro
      - letsencrypt_data:/letsencrypt
      - ./logs/traefik:/var/log/traefik
      - ./traefik-dynamic.yml:/etc/traefik/dynamic/dynamic.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-middlewares.rule=Host(`localhost`)"
      - "traefik.http.routers.traefik-middlewares.entrypoints=web"
      - "traefik.http.routers.traefik-middlewares.service=api@internal"
      - "traefik.http.routers.traefikdash.rule=Host(`traefik.60sec.shop`)"
      - "traefik.http.routers.traefikdash.priority=6000"
      - "traefik.http.routers.traefikdash.service=api@internal"
      - "traefik.http.routers.traefikdash.entrypoints=websecure"
      - "traefik.http.routers.traefikdash.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefikdash.middlewares=apex-cf-allowlist@file,apex-dash-redirect@file,apex-basic-auth@file"
    deploy:
      resources:
        limits:
          pids: 150
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - apex-public
      - apex-internal

  # ═══════════════════════════════════════════════════════════════
  # Backups (Postgres & Gitea)
  # ═══════════════════════════════════════════════════════════════
  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: apex-db-backup
    restart: always
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-apex}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-apex_v2}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    secrets:
      - postgres_password
    volumes:
      - db_backups:/backups
    deploy:
      resources:
        limits:
          pids: 50
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - apex-data

# ═══════════════════════════════════════════════════════════════
# STRICT DOCKER SECRETS (Must be initialized on host via docker swarm/local)
# ═══════════════════════════════════════════════════════════════
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  minio_password:
    file: ./secrets/minio_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  cf_dns_token:
    file: ./secrets/cf_dns_token.txt
  cf_zone_token:
    file: ./secrets/cf_zone_token.txt
  gitea_db_password:
    file: ./secrets/gitea_db_password.txt
  webhook_secret:
    file: ./secrets/webhook_secret.txt
  encryption_master_key:
    file: ./secrets/encryption_master_key.txt
  api_key_secret:
    file: ./secrets/api_key_secret.txt
  blind_index_pepper:
    file: ./secrets/blind_index_pepper.txt
  session_salt:
    file: ./secrets/session_salt.txt
  internal_api_secret:
    file: ./secrets/internal_api_secret.txt
  super_admin_password:
    file: ./secrets/super_admin_password.txt

volumes:
  postgres_data:
  redis_data:
  minio_data:
  gitea_data:
  gitea_conf:
  letsencrypt_data:
  gitea_db_data:
  gitea_backups:
  db_backups:

networks:
  apex-public:
    external: true
  apex-internal:
    external: true
  apex-data:
    external: true
