stages:
  - security
  - build
  - test
  - deploy

variables:
  NODE_OPTIONS: "--max-old-space-size=4096"
  JWT_SECRET: "test_secret_key_for_ci_environment_only_32"

default:
  image: oven/bun:latest
  before_script:
    - bun install --frozen-lockfile

# Security Phase
secret_scan:
  stage: security
  image: 
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  before_script: []
  script:
    - gitleaks detect --source . --verbose --redact

s1_compliance:
  stage: security
  script:
    - test -f apps/api/.env.s1.local || (echo "S1 env missing" && exit 1)
    - grep -q "DATABASE_URL=" apps/api/.env.s1.local
    - grep -q "REDIS_URL=" apps/api/.env.s1.local
    - grep -q "S3_ENDPOINT=" apps/api/.env.s1.local
    - isolation_mode=$(grep "^TENANT_ISOLATION_MODE=" apps/api/.env.s1.local | cut -d= -f2 | tr -d '"')
    - if [ "$isolation_mode" != "strict" ]; then exit 1; fi

# Build Phase
build:
  stage: build
  script:
    - bun run build
  artifacts:
    paths:
      - "packages/*/dist"
      - "apps/api/dist"
      - "apps/web/.next"
    expire_in: 1 day

# Test Phase
unit_tests:
  stage: test
  needs: ["build"]
  script:
    - bunx vitest run --coverage --reporter=verbose --reporter=cobertura
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days
  coverage: '/Lines\s*:\s*(\d+.?\d+)%/'

# Deploy Phase
deploy_staging:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - echo "Deploying to Staging..."
  environment:
    name: staging
