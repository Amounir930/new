# 🛡️ Apex Elite Security - GitLab Version (Hardened)
image: oven/bun:latest

stages:
  - security_scans
  - quality_check
  - build
  - test_integrity
  - deploy

variables:
  NODE_OPTIONS: "--max-old-space-size=4096"
  JWT_SECRET: "test_secret_key_for_ci_environment_only_32"
  TENANT_ISOLATION_MODE: "strict"

default:
  before_script:
    - bun install --frozen-lockfile

# ═══════════════════════════════════════════════════════════════
# 1. SURGICAL SECURITY SCANS (S3, S5, S8)
# ═══════════════════════════════════════════════════════════════
surgical_security:
  stage: security_scans
  script:
    - echo "🚨 Scanning for SQL Injection Patterns (S3.2)..."
    - "! grep -rnE '\\.(query|execute).*\\+' packages/ apps/ --include='*.ts' --exclude='*.test.ts' --exclude='*.spec.ts' --exclude-dir=node_modules | grep -vE '/\\s\\+/g'"
    - echo "🩸 Scanning for Information Leaks (S5.2)..."
    - "! grep -rnE '\\.stack|\\.printStackTrace\\(\\)' packages/ apps/ --include='*.ts' --exclude='*.test.ts' --exclude='*.spec.ts' --exclude-dir=node_modules | grep -v 'exception-filter.ts' | grep -v 'provision.ts'"
    - echo "🪖 Verifying Helmet Shield (S8)..."
    - "grep -r 'app.use(helmet(' apps/api/src"

# ═══════════════════════════════════════════════════════════════
# 2. STRUCTURAL INTEGRITY (TSC & S14)
# ═══════════════════════════════════════════════════════════════
code_integrity:
  stage: quality_check
  script:
    - echo "🧩 Verifying TypeScript Boundaries..."
    - "if [ ! -f 'packages/export/tsconfig.json' ]; then exit 1; fi"
    - bunx tsc --noEmit --project packages/export/tsconfig.json
    - echo "🧹 Verifying S14 Cleanup Logic..."
    - 'CLEANUP_COUNT=$(grep -cE "rm.*-rf|rm.*-f|cleanup" packages/export/src/strategies/*.ts | awk -F: ''{sum+=$NF} END {print sum+0}'')'
    - 'if [ "$CLEANUP_COUNT" -lt 3 ]; then echo "🚨 Missing Cleanup Logic!"; exit 1; fi'
    - echo "✨ Running Global Lint Check..."
    - bun run lint

# ═══════════════════════════════════════════════════════════════
# 3. BUILD PHASE
# ═══════════════════════════════════════════════════════════════
build:
  stage: build
  script:
    - bun run build
  artifacts:
    paths:
      - "packages/*/dist"
      - "apps/api/dist"
      - "apps/web/.next"
    expire_in: 1 day

# ═══════════════════════════════════════════════════════════════
# 4. DYNAMIC SECURITY TESTS (S2 & S14)
# ═══════════════════════════════════════════════════════════════
security_tests:
  stage: test_integrity
  needs: ["build"]
  services:
    - postgres:16-alpine
    - redis:7-alpine
  variables:
    DATABASE_URL: ${{ secrets.DATABASE_URL }}
  script:
    - bunx vitest run --coverage --reporter=verbose --reporter=cobertura
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 7 days
  coverage: '/Lines\s*:\s*(\d+.?\d+)%/'

# ═══════════════════════════════════════════════════════════════
# 5. DEPLOY PHASE
# ═══════════════════════════════════════════════════════════════
deploy_staging:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - echo "🚀 Deploying to Staging..."
  environment:
    name: staging
